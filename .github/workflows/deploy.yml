name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Pages project (if not exists)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ${{ vars.PROJECT_NAME }} --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ vars.PROJECT_NAME }} --commit-dirty=true

      - name: Add custom domain (if set)
        if: vars.CUSTOM_DOMAIN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project add-domain ${{ vars.PROJECT_NAME }} ${{ vars.CUSTOM_DOMAIN }}
        continue-on-error: true

      - name: Print live URL
        run: |
          echo "============================================"
          echo "  DEPLOYED SUCCESSFULLY"
          echo "  Live at: https://${{ vars.PROJECT_NAME }}.pages.dev"
          if [ -n "${{ vars.CUSTOM_DOMAIN }}" ]; then
            echo "  Custom:  https://${{ vars.CUSTOM_DOMAIN }}"
          fi
          echo "============================================"
          echo ""
          echo "If the site above doesn't look right, the project"
          echo "name '${{ vars.PROJECT_NAME }}' may already be taken"
          echo "by another Cloudflare account. Change PROJECT_NAME"
          echo "in your repo's GitHub Actions variables to fix this."
