name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ──────────────────────────────────────────────
# CONFIG — edit these to customize your deploy
# ──────────────────────────────────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Project name → becomes https://<PROJECT_NAME>.pages.dev
  PROJECT_NAME: "vibe-cloudflare"
  # Custom domain (optional) — leave empty to skip
  # e.g. "mysite.com" or "app.mysite.com"
  CUSTOM_DOMAIN: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Pages project (if not exists)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ${{ env.PROJECT_NAME }} --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ env.PROJECT_NAME }} --commit-dirty=true

      - name: Add custom domain (if set)
        if: env.CUSTOM_DOMAIN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project add-domain ${{ env.PROJECT_NAME }} ${{ env.CUSTOM_DOMAIN }}
        continue-on-error: true
